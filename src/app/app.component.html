<main class="app-container" style="padding: 24px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 32px;">
  
  <header>
    <h1 style="font-size: 28px; font-weight: 700; color: var(--accent-gold); text-shadow: var(--shadow-glow); text-align: center;">Zenith</h1>
    <p style="text-align: center; color: var(--text-secondary); font-size: 14px; margin-top: 4px;">Tracker of the Arcanum</p>
  </header>

  <section>
    <h2 style="font-size: 18px; margin-bottom: 16px; color: var(--text-primary);">This Week</h2>
    <app-week-date-selector></app-week-date-selector>
  </section>

  <section style="display: flex; justify-content: center; margin: 16px 0;">
    <app-pill-toggle></app-pill-toggle>
  </section>

  <section>
    <h2 style="font-size: 18px; margin-bottom: 16px; color: var(--text-primary);">Overview</h2>
    <app-dashboard-card></app-dashboard-card>
  </section>

  <router-outlet></router-outlet>
</main>

<app-bottom-nav></app-bottom-nav>
