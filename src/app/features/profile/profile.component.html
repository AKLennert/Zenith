<div class="profile-container">

  <!-- Loading State -->
  <div class="loading-state" *ngIf="isLoading">
    <div class="arcane-spinner"></div>
    <p>Summoning your profile...</p>
  </div>

  <ng-container *ngIf="!isLoading && profile">
    <div class="profile-header">
      <div class="avatar-circle">
        <span class="avatar-icon">🧙‍♂️</span>
      </div>
      <h2>{{ profile.displayName || 'Apprentice Wizard' }}</h2>
      <p class="email-label">{{ profile.email }}</p>
    </div>

    <!-- Edit Profile Form -->
    <div class="profile-card">
      <h3 class="card-title">Profile Details</h3>
      
      <div class="form-group">
        <label>Display Name</label>
        <input 
          type="text" 
          [(ngModel)]="profile.displayName" 
          placeholder="e.g. Gandalf"
          class="cyber-input" />
      </div>

      <h3 class="card-title mt-4">Journey Preferences</h3>

      <div class="form-group toggle-group">
        <label>Daily Check-in Reminder</label>
        <label class="cyber-switch">
          <input type="checkbox" [(ngModel)]="profile.dailyReminder">
          <span class="slider"></span>
        </label>
      </div>

      <div class="form-group">
        <label>Default Quest Duration</label>
        <select [(ngModel)]="profile.defaultQuestDuration" class="cyber-input select">
          <option [ngValue]="7">7 Days (Apprentice)</option>
          <option [ngValue]="14">14 Days (Adept)</option>
          <option [ngValue]="21">21 Days (Master)</option>
          <option [ngValue]="30">30 Days (Grand Magus)</option>
        </select>
      </div>

      <button class="btn-save mt-3" (click)="saveProfile()" [disabled]="isSaving">
        <span *ngIf="!isSaving">Save Setting Runes</span>
        <span *ngIf="isSaving">Scribing...</span>
      </button>
    </div>

    <!-- Actions -->
    <div class="profile-card actions-card">
      <h3 class="card-title">Arcane Archives</h3>
      <p class="actions-desc">Manage your data scrolls or leave the sanctum entirely.</p>
      
      <button class="btn-action" (click)="exportData()">
        <span class="icon">📜</span> Export My Data
      </button>
      
      <button class="btn-action btn-danger" (click)="deleteAccount()">
        <span class="icon">🔥</span> Banish Account
      </button>

      <button class="btn-logout mt-2" (click)="logout()">
        <span class="icon">🚪</span> Leave Sanctum
      </button>
    </div>
  </ng-container>

</div>
