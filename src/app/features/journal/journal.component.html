<div class="home-container">

  <!-- Header -->
  <div class="home-header">
    <div>
      <span class="greeting-label">Your Journal</span>
      <h1>Recent Logs</h1>
    </div>
    <div class="header-date">
      <span>{{ selectedDate | date:'EEE, MMM d' }}</span>
      <span class="saving-indicator" [class.visible]="isSaving">✦ scribing...</span>
    </div>
  </div>

  <!-- Monthly Calendar -->
  <app-month-calendar
    [logs]="monthLogs"
    [selectedDateStr]="selectedDateStr"
    mode="journal"
    (daySelected)="onDaySelectedFromCalendar($event)">
  </app-month-calendar>

  <!-- Week Date Carousel -->
  <div class="date-carousel">
    <div
      class="date-item"
      *ngFor="let d of dates"
      [class.active]="formatDate(d) === selectedDateStr"
      (click)="selectDate(d)">
      <span class="day-name">{{ getDisplayDay(d) }}</span>
      <span class="date-num">{{ d.getDate() }}</span>
      <span class="day-dot"
        [class.dot-clean]="monthLogs[formatDate(d)]?.partook === false && !monthLogs[formatDate(d)]?.mood"
        [class.dot-ripped]="monthLogs[formatDate(d)]?.partook === true && !monthLogs[formatDate(d)]?.mood"
        [class.mood-great]="monthLogs[formatDate(d)]?.mood === 'great'"
        [class.mood-good]="monthLogs[formatDate(d)]?.mood === 'good'"
        [class.mood-neutral]="monthLogs[formatDate(d)]?.mood === 'neutral'"
        [class.mood-bad]="monthLogs[formatDate(d)]?.mood === 'bad'"
        [class.mood-terrible]="monthLogs[formatDate(d)]?.mood === 'terrible'">
      </span>
    </div>
  </div>

  <!-- Check-in Section -->
  <div class="checkin-section" *ngIf="!isLoading">
    <h3 class="checkin-label">
      Reflecting on
      <strong>{{ getDisplayDay(selectedDate) === 'Today' ? 'Today' : getDisplayDate(selectedDate) }}</strong>
    </h3>

    <!-- Mood Selector -->
    <div class="mood-selector">
      <h4>How are you feeling?</h4>
      <div class="mood-options">
        <button 
          *ngFor="let mood of moodOptions"
          class="mood-btn"
          [class.active]="currentLog.mood === mood.value"
          (click)="setMood(mood.value)">
          <span class="mood-icon">{{ mood.icon }}</span>
          <span class="mood-label">{{ mood.label }}</span>
        </button>
      </div>
    </div>

    <!-- Journal -->
    <div class="journal-section">
      <h4>📝 Notes & Thoughts</h4>
      <div class="textarea-wrapper">
        <textarea
          [(ngModel)]="currentLog.journal"
          (ngModelChange)="onJournalChange()"
          placeholder="Jot down thoughts, revelations, or how the magic feels today...">
        </textarea>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-state" *ngIf="isLoading">
    <div class="arcane-spinner"></div>
    <p>Opening the archives...</p>
  </div>

</div>
